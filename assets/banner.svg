<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="Gaming Assistant for Home Assistant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"></stop>
      <stop offset="0.6" stop-color="#0e1a2e"></stop>
      <stop offset="1" stop-color="#1a0a2e"></stop>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#41BDF5"></stop>
      <stop offset="0.5" stop-color="#8be9ff"></stop>
      <stop offset="1" stop-color="#ff2d75"></stop>
    </linearGradient>
    <linearGradient id="sub" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#41BDF5" stop-opacity="0.9"></stop>
      <stop offset="1" stop-color="#b026ff" stop-opacity="0.9"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#41BDF5" stop-opacity="0.35"></stop>
      <stop offset="1" stop-color="#41BDF5" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff2d75" stop-opacity="0.28"></stop>
      <stop offset="1" stop-color="#ff2d75" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#41BDF5" stroke-opacity="0.08" stroke-width="1"></path>
    </pattern>
    <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#41BDF5" fill-opacity="0.18"></circle>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="2"></feGaussianBlur></filter>
  </defs>

  
  <rect width="1280" height="420" fill="url(#bg)"></rect>
  <rect width="1280" height="420" fill="url(#grid)"></rect>
  <ellipse cx="240" cy="160" rx="380" ry="220" fill="url(#glow)"></ellipse>
  <ellipse cx="1080" cy="320" rx="320" ry="200" fill="url(#glow2)"></ellipse>

  
  <g opacity="0.06" fill="#ffffff">
    <rect y="0" width="1280" height="1"></rect>
    <rect y="4" width="1280" height="1"></rect>
    <rect y="8" width="1280" height="1"></rect>
    <rect y="12" width="1280" height="1"></rect>
    <rect y="16" width="1280" height="1"></rect>
    <rect y="20" width="1280" height="1"></rect>
    <rect y="24" width="1280" height="1"></rect>
  </g>

  
  <g transform="translate(80,72)">
    <rect x="0" y="0" width="14" height="14" fill="#41BDF5"></rect>
    <rect x="20" y="0" width="14" height="14" fill="#41BDF5" opacity="0.55"></rect>
    <rect x="40" y="0" width="14" height="14" fill="#ff2d75" opacity="0.8"></rect>
    <text x="68" y="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#8be9ff" letter-spacing="3">
      HACS · v0.11 · LOCAL-FIRST · OPEN SOURCE
    </text>
  </g>

  
  <text x="80" y="200" font-family="ui-sans-serif, system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-size="108" font-weight="900" fill="url(#title)" letter-spacing="-4">
    GAMING ASSISTANT
  </text>
  <text x="82" y="200" font-family="ui-sans-serif, system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-size="108" font-weight="900" fill="#41BDF5" opacity="0.18" letter-spacing="-4" filter="url(#blur)">
    GAMING ASSISTANT
  </text>

  
  <text x="82" y="252" font-family="ui-sans-serif, system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-size="30" font-weight="600" fill="url(#sub)" letter-spacing="0">
    An AI coach that watches your screen and whispers tips into your smart home.
  </text>

  
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">
    <g transform="translate(82,300)">
      <rect x="0" y="0" width="170" height="36" rx="18" fill="none" stroke="#41BDF5" stroke-opacity="0.6"></rect>
      <text x="20" y="23" fill="#8be9ff">◉  VISION LLM</text>
    </g>
    <g transform="translate(264,300)">
      <rect x="0" y="0" width="138" height="36" rx="18" fill="none" stroke="#41BDF5" stroke-opacity="0.6"></rect>
      <text x="20" y="23" fill="#8be9ff">◇  MQTT</text>
    </g>
    <g transform="translate(414,300)">
      <rect x="0" y="0" width="186" height="36" rx="18" fill="none" stroke="#b026ff" stroke-opacity="0.65"></rect>
      <text x="20" y="23" fill="#d59cff">▶  PC · ANDROID · TV</text>
    </g>
    <g transform="translate(612,300)">
      <rect x="0" y="0" width="174" height="36" rx="18" fill="none" stroke="#ff2d75" stroke-opacity="0.7"></rect>
      <text x="20" y="23" fill="#ff6fa5">♛  26 GAME PACKS</text>
    </g>
    <g transform="translate(798,300)">
      <rect x="0" y="0" width="142" height="36" rx="18" fill="none" stroke="#00ffa3" stroke-opacity="0.55"></rect>
      <text x="20" y="23" fill="#7dffc8">●  4 MODES</text>
    </g>
  </g>

  
  <g transform="translate(960,90)" opacity="0.95">
    
    <g fill="#41BDF5" opacity="0.5">
      <rect x="0" y="0" width="8" height="8"></rect>
      <rect x="16" y="0" width="8" height="8"></rect>
      <rect x="240" y="0" width="8" height="8"></rect>
      <rect x="0" y="220" width="8" height="8"></rect>
      <rect x="240" y="220" width="8" height="8"></rect>
    </g>

    
    <g transform="translate(40,30)">
      <ellipse cx="100" cy="80" rx="92" ry="58" fill="#0a0e1a" stroke="#41BDF5" stroke-width="2"></ellipse>
      <ellipse cx="100" cy="80" rx="92" ry="58" fill="none" stroke="#41BDF5" stroke-width="1" opacity="0.45" transform="translate(0,-3)"></ellipse>
      <circle cx="100" cy="80" r="34" fill="none" stroke="#8be9ff" stroke-width="2"></circle>
      <circle cx="100" cy="80" r="20" fill="#ff2d75"></circle>
      <circle cx="100" cy="80" r="10" fill="#0a0e1a"></circle>
      <circle cx="108" cy="72" r="3" fill="#ffffff"></circle>
      
      <line x1="14" y1="80" x2="186" y2="80" stroke="#00ffa3" stroke-width="1" stroke-dasharray="4 6" opacity="0.85"></line>
      <text x="100" y="170" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#8be9ff" letter-spacing="3">ANALYZING</text>
    </g>

    
    <g stroke="#41BDF5" stroke-width="2" fill="none">
      <path d="M0 0 L0 24 M0 0 L24 0"></path>
      <path d="M248 0 L248 24 M248 0 L224 0"></path>
      <path d="M0 228 L0 204 M0 228 L24 228"></path>
      <path d="M248 228 L248 204 M248 228 L224 228"></path>
    </g>
  </g>

  
  <g transform="translate(0,378)">
    <rect width="1280" height="42" fill="#000000" fill-opacity="0.45"></rect>
    <text x="80" y="27" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#41BDF5" opacity="0.85" letter-spacing="2">
      &gt;  capture →  hash →  detect →  prompt →  inference →  tip →  TTS · lights · notify
    </text>
    <circle cx="1230" cy="21" r="4" fill="#00ffa3"></circle>
    <text x="1244" y="26" font-family="ui-monospace, monospace" font-size="12" fill="#7dffc8" font-weight="700">LIVE</text>
  </g>
