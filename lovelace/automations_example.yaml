################################################################################
# Gaming Assistant – Automation Examples (v0.9)
# Add these to your automations.yaml or import via the UI
################################################################################

# -- 1a. Read tip aloud via built-in announce service --------------------------
#    (Simplest approach — uses TTS configured in the integration settings)
- alias: "Gaming Assistant – Announce Tip (built-in)"
  description: "Reads new tips aloud using the built-in announce service."
  trigger:
    - platform: event
      event_type: gaming_assistant_new_tip
  action:
    - service: gaming_assistant.announce
      data:
        message: "{{ trigger.event.data.tip }}"
  mode: single

# -- 1b. Read tip aloud via manual TTS call (legacy approach) -----------------
#    (If you prefer direct TTS control or don't have announce configured)
- alias: "Gaming Assistant – Speak Tip (manual TTS)"
  description: "Reads new AI tips aloud while gaming mode is on."
  trigger:
    - platform: state
      entity_id: sensor.gaming_assistant_tip
  condition:
    - condition: state
      entity_id: binary_sensor.gaming_mode
      state: "on"
  action:
    - service: tts.speak
      target:
        entity_id: tts.piper  # Change to your TTS provider
      data:
        message: "{{ states('sensor.gaming_assistant_tip') }}"
  mode: single

# -- 2. Change RGB light color when gaming mode starts ------------------------
- alias: "Gaming Assistant – Gaming Lights On"
  trigger:
    - platform: state
      entity_id: binary_sensor.gaming_mode
      to: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.gaming_desk  # Change to your light entity
      data:
        rgb_color: [255, 30, 0]
        brightness: 200
  mode: single

# -- 3. Restore lights when gaming stops --------------------------------------
- alias: "Gaming Assistant – Gaming Lights Off"
  trigger:
    - platform: state
      entity_id: binary_sensor.gaming_mode
      to: "off"
  action:
    - service: light.turn_on
      target:
        entity_id: light.gaming_desk
      data:
        rgb_color: [255, 200, 100]
        brightness: 150
  mode: single

# -- 4. Send tip as mobile notification --------------------------------------
- alias: "Gaming Assistant – Notify Tip"
  trigger:
    - platform: state
      entity_id: sensor.gaming_assistant_tip
  condition:
    - condition: state
      entity_id: binary_sensor.gaming_mode
      state: "on"
  action:
    - service: notify.mobile_app_your_phone  # Change to your notify service
      data:
        title: "Gaming Tip"
        message: "{{ states('sensor.gaming_assistant_tip') }}"
  mode: single

# -- 5. Set spoiler level to "none" for story-heavy games ---------------------
- alias: "Gaming Assistant – No Story Spoilers for RPGs"
  description: "Automatically sets story spoilers to none when an RPG is detected."
  trigger:
    - platform: state
      entity_id: sensor.gaming_assistant_tip
      attribute: game
  condition:
    - condition: template
      value_template: >
        {{ state_attr('sensor.gaming_assistant_tip', 'game') in
           ['Elden Ring', 'Dark Souls', "Baldur's Gate", 'The Witcher'] }}
  action:
    - service: gaming_assistant.set_spoiler_level
      data:
        category: story
        level: none
    - service: gaming_assistant.set_spoiler_level
      data:
        category: lore
        level: none
  mode: single

# -- 6. Event-based notification with game context ----------------------------
- alias: "Gaming Assistant – Event Notify with Game"
  description: "Send a notification with game context when a new tip is generated."
  trigger:
    - platform: event
      event_type: gaming_assistant_new_tip
  action:
    - service: notify.mobile_app_your_phone  # Change to your notify service
      data:
        title: "Gaming Tip ({{ trigger.event.data.game }})"
        message: "{{ trigger.event.data.tip }}"
  mode: single
