################################################################################
# Gaming Assistant – Lovelace Dashboard (v0.8)
# Copy this into a manual card or your dashboard YAML
################################################################################

type: vertical-stack
cards:

  # -- Header ----------------------------------------------------------------
  - type: markdown
    content: |
      ## Gaming Assistant
      AI-powered coach running locally via Ollama

  # -- Status row ------------------------------------------------------------
  - type: horizontal-stack
    cards:
      - type: entity
        entity: binary_sensor.gaming_mode
        name: Gaming Mode
        icon: mdi:gamepad-variant

      - type: entity
        entity: sensor.gaming_assistant_status
        name: Status
        icon: mdi:robot

      - type: entity
        entity: sensor.gaming_assistant_history
        name: Tips Count
        icon: mdi:history

  # -- Controls (Select + Number entities) -----------------------------------
  - type: entities
    title: Controls
    entities:
      - entity: select.gaming_assistant_assistant_mode
        name: Mode
      - entity: select.gaming_assistant_spoiler_level
        name: Spoiler Level
      - entity: number.gaming_assistant_interval
        name: Interval
      - entity: number.gaming_assistant_timeout
        name: Timeout
      - entity: switch.gaming_assistant_auto_announce
        name: Auto Announce

  # -- Current tip -----------------------------------------------------------
  - type: markdown
    content: |
      ### Current Tip
      > {{ states('sensor.gaming_assistant_tip') }}

      {% if state_attr('sensor.gaming_assistant_tip', 'game') %}
      **Game:** {{ state_attr('sensor.gaming_assistant_tip', 'game') }}
      {% endif %}

  # -- Tip History -----------------------------------------------------------
  - type: markdown
    content: |
      ### Recent Tips
      {% set tips = state_attr('sensor.gaming_assistant_history', 'recent_tips') %}
      {% if tips %}
      {% for entry in tips | reverse %}
      {{ loop.index }}. {{ entry.tip }}
      {% endfor %}
      {% else %}
      _No tips yet._
      {% endif %}

  # -- Diagnostics -----------------------------------------------------------
  - type: horizontal-stack
    cards:
      - type: entity
        entity: sensor.gaming_assistant_latency
        name: Latency
        icon: mdi:clock

      - type: entity
        entity: sensor.gaming_assistant_frames_processed
        name: Frames
        icon: mdi:image-multiple

      - type: entity
        entity: sensor.gaming_assistant_active_watchers
        name: Watchers
        icon: mdi:camera-eye

  # -- Action buttons --------------------------------------------------------
  - type: horizontal-stack
    cards:
      - type: button
        name: Analyze Now
        icon: mdi:camera
        tap_action:
          action: call-service
          service: gaming_assistant.analyze

      - type: button
        name: Start Agent
        icon: mdi:play
        tap_action:
          action: perform-action
          perform_action: gaming_assistant.start

      - type: button
        name: Stop Agent
        icon: mdi:stop
        tap_action:
          action: perform-action
          perform_action: gaming_assistant.stop

      - type: button
        name: Clear History
        icon: mdi:delete
        tap_action:
          action: call-service
          service: gaming_assistant.clear_history

      - type: button
        name: Announce
        icon: mdi:bullhorn
        tap_action:
          action: call-service
          service: gaming_assistant.announce
