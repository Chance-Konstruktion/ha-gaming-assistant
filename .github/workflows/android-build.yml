name: Android Capture Build

on:
  pull_request:
    paths:
      - "android-capture-agent/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build-debug-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-capture-agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ga-android-capture-debug-apk
          path: android-capture-agent/app/build/outputs/apk/debug/*.apk
