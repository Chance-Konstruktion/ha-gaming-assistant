name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests + syntax checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        # requirements-test.txt is the single source of truth for the full set
        # of test deps. Installing all of them (incl. numpy) means the capture
        # bridge, OCR, audio, chess and agent-executor suites run for real —
        # nothing is silently skipped (enforced below via STRICT_NO_SKIP).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Python syntax check (all .py files)
        run: find . -name '*.py' -not -path './.git/*' -exec python -m py_compile {} +

      - name: Lint (ruff)
        run: ruff check custom_components/gaming_assistant tests worker

      - name: Run tests + coverage
        # STRICT_NO_SKIP turns a skipped test into a build failure: with every
        # optional dep installed, a skip means a dependency went missing and a
        # module stopped being exercised. -rs prints any skip reason in the log.
        env:
          STRICT_NO_SKIP: "1"
        run: |
          pytest -q -rs \
            --ignore=tests/test_setup_smoketest.py \
            --cov=custom_components/gaming_assistant \
            --cov-report=term-missing \
            --cov-fail-under=70

  smoketest:
    name: HA load smoketest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Home Assistant test stack
        # Heavyweight, isolated from the unit job: a real HA core plus the
        # runtime deps of the integration's manifest dependencies.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-smoketest.txt

      - name: Boot a real Home Assistant and load the integration
        # Separate from the unit suite, which stubs HA away — this one needs the
        # genuine article. asyncio_mode=auto is set inline so the unit job's
        # config is untouched.
        run: pytest -o asyncio_mode=auto -p no:cacheprovider tests/test_setup_smoketest.py -v
