name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests + syntax checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r worker/requirements-capture.txt

      - name: Python syntax check
        run: python -m py_compile worker/capture_agent.py
             && python -m py_compile worker/capture_agent_android.py
             && python -m py_compile worker/capture_agent_android_tv.py
             && python -m py_compile worker/capture_agent_ipcam.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
