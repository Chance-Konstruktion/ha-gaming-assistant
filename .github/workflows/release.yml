name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create HACS zip
        run: |
          mkdir -p dist
          zip -r dist/gaming_assistant_hacs.zip \
            custom_components/gaming_assistant \
            hacs.json README.md LICENSE

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gaming_assistant_hacs.zip
          generate_release_notes: true
